name: Deploy Docs 

on:
  push:
    branches:
      - main

jobs:
  deploy-docs:
    uses: fermi-ad/.github/.github/workflows/deploy-rust-docs.yaml@75e45bfe74331d410a0af9eb1af33fd8d1f1806a
    secrets: inherit 
    permissions:
      contents: write
      id-token: write
      pages: write
    with:
      static-dependencies: 'libcurl4-openssl-dev libsasl2-dev'