name: Rust Continuous Integration

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  run-tests-and-coverage:
    uses: fermi-ad/.github/.github/workflows/rust-integration.yaml@76f13236aaddfed6f43b666d241d4ca4dbe621cf
    secrets: inherit
    permissions:
      contents: write
      pull-requests: write
    with:
      references-internal-git-repo: true
      static-dependencies: 'libcurl-dev librdkafka-dev libsasl2-dev'
