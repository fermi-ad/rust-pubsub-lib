name: Rust Continuous Integration

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  run-tests-and-coverage:
    uses: fermi-ad/.github/.github/workflows/rust-integration.yaml@39546441518cda136912addef24e6dc8eb3d1c29
    secrets: inherit
    permissions:
      contents: write
      pull-requests: write
    with:
      references-internal-git-repo: true
      static-dependencies: 'libcurl4-openssl-dev librdkafka-dev libsasl2-dev'
