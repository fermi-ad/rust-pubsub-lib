[package]
name = "rust-pubsub-lib"
version = "6.0.1"
edition = "2024"

[dependencies]
async-trait = "0.1.89"
rdkafka = { version = "0.39.0", features = ["cmake-build", "gssapi", "tracing"] }
rust-env-var-lib = { git = "https://github.com/fermi-ad/rust-env-var-lib.git", tag = "v1.2.0" }
tokio = { version = "1.50.0", features = ["macros", "rt-multi-thread", "sync"] }
tokio-stream = { version = "0.1.18", features = ["sync"] }
uuid = { version = "1.22.0", features = ["v4"] }

[features]
default = []
testing-utils = []
